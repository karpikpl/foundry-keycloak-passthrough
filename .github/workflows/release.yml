name: release

on:
  push:
    tags:
      - 'v*.*.*'    # vX.Y.Z — production releases
      - 'v*.*.*-*'  # vX.Y.Z-rc.1 — prereleases (cosign skipped, see below)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3). Image will be tagged with this and pushed to GHCR.'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write   # cosign keyless signing
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Resolve which tag we're building (push event → ref_name, dispatch → input).
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag policy:
      #   v1.2.3 → latest, 1.2.3, 1.2, 1, sha-<short>
      #   v1.2.3-rc.1 → 1.2.3-rc.1, sha-<short>   (NO floating tags for prereleases)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.value }},enable=${{ !contains(steps.tag.outputs.value, '-') }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.value }},enable=${{ !contains(steps.tag.outputs.value, '-') }}
            type=raw,value=latest,enable=${{ !contains(steps.tag.outputs.value, '-') }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=mcp-oauth
            org.opencontainers.image.description=FastMCP server with Microsoft Entra auth and OBO passthrough.
            org.opencontainers.image.licenses=MIT

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless sign (cosign with GitHub OIDC). Skipped for prereleases to
      # avoid filling the signature index — flip the condition if you want
      # prereleases signed too.
      - name: Install cosign
        if: ${{ !contains(steps.tag.outputs.value, '-') }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        if: ${{ !contains(steps.tag.outputs.value, '-') }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          echo "$TAGS" | xargs -I{} cosign sign --yes "{}@${DIGEST}"
