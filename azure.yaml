# azure.yaml — AZD project definition for cloud-helper-fastmcp
# Created: 2026-05-09T04:22:42Z
# Migrated from scripts/provision-two-app-regs.sh to AZD + Bicep.
# Run `azd provision` to deploy infra; `azd deploy` to deploy server code.
# See infra/README.md for full setup instructions.

name: cloud-helper-fastmcp
metadata:
  template: azd-init@1.9.0

services:
  server:
    # FastMCP Python server — Naomi owns the UV/UVX packaging in server/
    project: ./server
    language: python
    host: appservice
    # AZD discovers the App Service by the azd-service-name tag set in Bicep.
    # Keep resourceName unset so each azd environment can deploy its own web app.

infra:
  provider: bicep
  path: ./infra

hooks:
  postprovision:
    shell: sh
    run: |
      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "🔗  Foundry MCP Connection — creating via REST"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo ""
      CONNECTION_NAME="$(echo "${WEB_APP_NAME}" | cut -c1-23)"
      CONNECTION_URL="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${AZURE_RESOURCE_GROUP}/providers/Microsoft.CognitiveServices/accounts/${FOUNDRY_NAME}/connections/${CONNECTION_NAME}?api-version=2025-09-01"

      BODY=$(printf '{
        "properties": {
          "target": "https://%s/mcp",
          "authType": "OAuth2",
          "category": "RemoteTool",
          "metadata": { "type": "custom_MCP" },
          "credentials": {
            "clientId": "%s",
            "clientSecret": ""
          },
          "tokenUrl": "https://login.microsoftonline.com/%s/oauth2/v2.0/token",
          "authorizationUrl": "https://login.microsoftonline.com/%s/oauth2/v2.0/authorize",
          "refreshUrl": "https://login.microsoftonline.com/%s/oauth2/v2.0/token",
          "scopes": ["https://%s/mcp/mcp.access"]
        }
      }' \
        "${APP_SLOT_HOSTNAME}" \
        "${ENTRA_APP_CLIENT_ID}" \
        "${AZURE_TENANT_ID}" \
        "${AZURE_TENANT_ID}" \
        "${AZURE_TENANT_ID}" \
        "${APP_SLOT_HOSTNAME}")

      echo "  🔍  Checking for existing connection..."
      EXISTING=$(az rest --method GET --url "${CONNECTION_URL}" -o json 2>/dev/null) || true
      EXISTING_REDIRECT=$(echo "${EXISTING}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('properties',{}).get('redirectUrl',''))" 2>/dev/null) || true

      if [ -n "$EXISTING_REDIRECT" ] && [ "$EXISTING_REDIRECT" != "None" ]; then
        echo "  ✅  Connection already exists with redirectUrl: $EXISTING_REDIRECT"
        REDIRECT_URL="$EXISTING_REDIRECT"
      else
        if [ -n "$EXISTING" ]; then
          echo "  🗑️  Deleting existing connection without redirectUrl..."
          az rest --method DELETE --url "${CONNECTION_URL}" 2>/dev/null || true
          sleep 5
        fi

        REDIRECT_URL=""
        # Try the canonical name first; fall back to a timestamped name if APIM
        # has a stale connector registration for this name from a previous run.
        for CONN_NAME in "${CONNECTION_NAME}" "${CONNECTION_NAME}-$(date +%s | tail -c 5)"; do
          CONN_URL="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${AZURE_RESOURCE_GROUP}/providers/Microsoft.CognitiveServices/accounts/${FOUNDRY_NAME}/connections/${CONN_NAME}?api-version=2025-09-01"
          echo "  📤  PUT ${CONN_URL}"
          RESPONSE=$(az rest --method PUT \
            --url "${CONN_URL}" \
            --body "${BODY}" \
            --headers "Content-Type=application/json" \
            -o json 2>&1) || true
          REDIRECT_URL=$(echo "${RESPONSE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('properties',{}).get('redirectUrl',''))" 2>/dev/null) || true
          if [ -n "$REDIRECT_URL" ] && [ "$REDIRECT_URL" != "None" ]; then
            echo "  ✅  Created connection: ${CONN_NAME}"
            break
          fi
          echo "  ⚠️  Failed (stale APIM registration for ${CONN_NAME}), trying fallback name..."
        done
      fi
      if [ -n "$REDIRECT_URL" ] && [ "$REDIRECT_URL" != "None" ]; then
        echo "  ✅  redirectUrl: $REDIRECT_URL"
        echo ""
        echo "  🔧  Patching app registration to include Foundry redirect URI..."
        # Get app registration object ID from appId (client ID)
        APP_OBJ_ID=$(az rest --method GET \
          --url "https://graph.microsoft.com/v1.0/applications?\$filter=appId eq '${ENTRA_APP_CLIENT_ID}'" \
          --query "value[0].id" -o tsv 2>/dev/null) || true
        if [ -n "$APP_OBJ_ID" ] && [ "$APP_OBJ_ID" != "None" ]; then
          # Fetch current publicClient.redirectUris
          CURRENT_URIS=$(az rest --method GET \
            --url "https://graph.microsoft.com/v1.0/applications/${APP_OBJ_ID}" \
            --query "publicClient.redirectUris" -o json 2>/dev/null) || true
          # Add REDIRECT_URL if not already present, then PATCH
          UPDATED_URIS=$(echo "${CURRENT_URIS}" | python3 -c "import sys,json; u=json.load(sys.stdin); r='${REDIRECT_URL}'; u.append(r) if r not in u else None; print(json.dumps(u))")
          az rest --method PATCH \
            --url "https://graph.microsoft.com/v1.0/applications/${APP_OBJ_ID}" \
            --body "{\"publicClient\":{\"redirectUris\":${UPDATED_URIS}}}" \
            --headers "Content-Type=application/json" > /dev/null 2>&1 \
            && echo "  ✅  Foundry redirect URI registered in app registration" \
            || echo "  ⚠️  Could not patch app registration — add manually: ${REDIRECT_URL}"
        else
          echo "  ⚠️  Could not find app registration object ID — add redirect URI manually:"
          echo "      Azure Portal → App registrations → ${WEB_APP_NAME}"
          echo "      → Authentication → Mobile and desktop applications"
          echo "      → Add URI: $REDIRECT_URL"
        fi
      else
        echo "  ⚠️  redirectUrl not yet available — re-run 'azd provision' or check the connection in the Azure Portal"
      fi
      echo ""
  postdeploy:
    shell: sh
    run: |
      echo ""
      echo "✅ Deployment complete!"
      echo ""

      # Write client/.env so test_client.py works without --url
      printf 'SERVER_URL=https://%s/mcp\nENTRA_APP_CLIENT_ID=%s\n' \
        "${APP_SLOT_HOSTNAME}" "${ENTRA_APP_CLIENT_ID}" > client/.env
      echo "  📝  Wrote client/.env"

      # Defaults for the auto-created agent; override via `azd env set` before deploy.
      AGENT_NAME="${AGENT_NAME:-cloud-helper-agent}"
      AGENT_MODEL="${AGENT_MODEL:-gpt-4o}"
      CONNECTION_NAME="$(echo "${WEB_APP_NAME}" | cut -c1-23)"

      # Write agent_v2/.env for the Foundry agent script
      printf 'FOUNDRY_ENDPOINT=https://%s.cognitiveservices.azure.com/api/projects/%s\nMCP_SERVER_URL=https://%s/mcp\nMCP_CONNECTION_NAME=%s\nAGENT_NAME=%s\nAGENT_MODEL=%s\n' \
        "${FOUNDRY_NAME}" "${FOUNDRY_PROJECT_NAME}" "${APP_SLOT_HOSTNAME}" \
        "${CONNECTION_NAME}" "${AGENT_NAME}" "${AGENT_MODEL}" > agent_v2/.env
      echo "  📝  Wrote agent_v2/.env"
      echo ""

      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "🤖  Creating Foundry agent via REST"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      AGENT_API_VERSION="2025-11-15-preview"
      PROJECT_ENDPOINT="https://${FOUNDRY_NAME}.cognitiveservices.azure.com/api/projects/${FOUNDRY_PROJECT_NAME}"
      CONNECTION_ARM_PATH="/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${AZURE_RESOURCE_GROUP}/providers/Microsoft.CognitiveServices/accounts/${FOUNDRY_NAME}/projects/${FOUNDRY_PROJECT_NAME}/connections/${CONNECTION_NAME}"

      FOUNDRY_TOKEN=$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv 2>/dev/null) || FOUNDRY_TOKEN=""

      if [ -z "$FOUNDRY_TOKEN" ]; then
        echo "  ⚠️  Could not obtain ai.azure.com token — skipping agent creation"
        echo "      (run 'az login' and retry with 'azd hooks run postdeploy')"
      else
        # Build JSON body via python — handles all string escaping safely.
        # Source kept on one logical line so YAML literal-block indentation
        # stays consistent (lines at column 0 would terminate the block).
        AGENT_BODY=$(AGENT_MODEL="${AGENT_MODEL}" \
                     APP_SLOT_HOSTNAME="${APP_SLOT_HOSTNAME}" \
                     CONNECTION_ARM_PATH="${CONNECTION_ARM_PATH}" \
          python3 -c "import json,os; print(json.dumps({'description':'Cloud Helper agent for the MCP OAuth demo. Calls the MCP server with OAuth identity passthrough.','definition':{'kind':'prompt','model':os.environ['AGENT_MODEL'],'instructions':'You are a helpful agent that uses MCP tools to assist users. When asked who the user is, call the whoami tool. When asked to greet someone, call the hello tool.','tools':[{'type':'mcp','server_label':'cloud_helper_mcp','server_url':'https://'+os.environ['APP_SLOT_HOSTNAME']+'/mcp','project_connection_id':os.environ['CONNECTION_ARM_PATH'],'require_approval':'always'}]}}))")

        AGENT_URL="${PROJECT_ENDPOINT}/agents/${AGENT_NAME}/versions?api-version=${AGENT_API_VERSION}"
        echo "  📤  POST ${AGENT_URL}"

        AGENT_RESPONSE=$(curl -sS -X POST "${AGENT_URL}" \
          -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "${AGENT_BODY}")

        AGENT_VERSION=$(echo "${AGENT_RESPONSE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version',''))" 2>/dev/null) || AGENT_VERSION=""

        if [ -n "$AGENT_VERSION" ] && [ "$AGENT_VERSION" != "None" ]; then
          echo "  ✅  Agent created: ${AGENT_NAME} (version ${AGENT_VERSION})"
        else
          echo "  ⚠️  Agent creation failed. Response:"
          echo "${AGENT_RESPONSE}" | head -c 1000
          echo ""
        fi
      fi
      echo ""

      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "🔗  MCP Server Endpoint"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo ""
      echo "  🟢  https://${APP_SLOT_HOSTNAME}/mcp"
      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "🤖  Configure Azure AI Foundry Agent — MCP Tool"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo ""
      echo "  In Foundry → Your Agent → Add Tool → Model Context Protocol"
      echo "  Select: OAuth Identity Passthrough"
      echo ""
      echo "  Field                   Value"
      echo "  ─────────────────────   ──────────────────────────────────────────────────────────"
      echo "  Remote MCP endpoint   : https://${APP_SLOT_HOSTNAME}/mcp"
      echo "  Client ID             : ${ENTRA_APP_CLIENT_ID}"
      echo "  Client secret         : (leave blank)"
      echo "  Auth URL              : https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize"
      echo "  Token URL             : https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token"
      echo "  Refresh URL           : https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token"
      echo "  Scopes                : https://${APP_SLOT_HOSTNAME}/mcp/mcp.access"
      echo ""
      echo "❗  Register the Foundry redirect URI in the app registration"
      echo "    under Authentication → Mobile and desktop applications."
      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "🧪  Quick VS Code test (mcp.json snippet)"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo ""
      echo '  "cloud-helper-mcp": {'
      echo '    "type": "http",'
      echo "    \"url\": \"https://${APP_SLOT_HOSTNAME}/mcp\""
      echo '  }'
      echo ""
